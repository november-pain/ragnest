# Ragnest Configuration
# Copy to config.yaml and adjust for your setup.
# Database credentials go in .env (not here).

database:
  host: localhost
  port: 5433
  name: ragnest

ollama:
  base_url: http://localhost:11434

# Default chunking settings (can be overridden per KB)
defaults:
  chunk_size: 1000
  chunk_overlap: 200
  separator: "\n\n"
