# RAG Hub Configuration

database:
  host: localhost
  port: 5432
  name: rag_hub
  user: postgres
  password: postgres  # change this

ollama:
  base_url: http://localhost:11434

# Default chunking settings (can be overridden per KB)
defaults:
  chunk_size: 1000
  chunk_overlap: 200
  separator: "\n\n"

# Knowledge base definitions
# Each KB has its own embedding model and optional settings
knowledge_bases:
  legal_ua:
    description: "Ukrainian legal documents"
    model: bge-m3
    dimensions: 1024
    chunk_size: 1500
    chunk_overlap: 300

  codebase:
    description: "Source code and technical docs"
    model: gte-qwen2:7b
    dimensions: 3584
    chunk_size: 800
    chunk_overlap: 100

  research:
    description: "Research papers and notes"
    model: bge-m3
    dimensions: 1024

  general:
    description: "General knowledge base"
    model: nomic-embed-text
    dimensions: 768
