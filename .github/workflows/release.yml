name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    name: CI checks
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      security-events: write

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: [ci]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Check package
        run: pip install twine && twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  # Pre-release tags (v0.1.0rc1, v0.1.0a1, v0.1.0b1) → TestPyPI
  publish-testpypi:
    name: Publish to TestPyPI
    if: contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b')
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ragnest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # Release tags (v0.1.0) → PyPI
  publish-pypi:
    name: Publish to PyPI
    if: ${{ !contains(github.ref_name, 'rc') && !contains(github.ref_name, 'a') && !contains(github.ref_name, 'b') }}
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ragnest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${{ github.ref_name }}"
          dist/*
          --title "${{ github.ref_name }}"
          --generate-notes
          ${{ (contains(github.ref_name, 'rc') || contains(github.ref_name, 'a') || contains(github.ref_name, 'b')) && '--prerelease' || '' }}
